name: reflect
label: Reflect
description: Deep navy with indigo-violet accents — calm, engineered, expensive. Aurora bloom behind hero surfaces.
palette:
  background:
    hex: '#0A0E1A'
    alpha: 1
  midground:
    hex: '#E6EAF2'
    alpha: 1
  foreground:
    hex: '#E6EAF2'
    alpha: 0
  warmGlow: rgba(99, 102, 241, 0.16)
  noiseOpacity: 0
typography:
  fontSans: '"Inter", system-ui, -apple-system, sans-serif'
  fontMono: '"Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace'
  fontDisplay: '"Inter", system-ui, -apple-system, sans-serif'
  fontUrl: https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap
  baseSize: 16px
  lineHeight: '1.5'
  letterSpacing: -0.005em
layout:
  radius: 0.5rem
  density: comfortable
  layoutVariant: standard
componentStyles:
  backdrop:
    fillerOpacity: '0'
    gridStroke: rgba(255,255,255,0.06)
    gridPointFill: rgba(255,255,255,0.35)
    gridPointDim: rgba(255,255,255,0.25)
  card:
    background: linear-gradient(180deg, rgba(30,30,45,0.6) 0%, rgba(20,20,30,0.3) 100%)
    backgroundAccent: linear-gradient(180deg, rgba(30,30,45,0.7) 0%, rgba(20,20,30,0.4) 100%)
    borderTop: 2px solid var(--theme-accent, var(--color-primary))
  header:
    background: linear-gradient(90deg, rgba(30,30,45,0.5) 0%, rgba(20,20,35,0.3) 100%)
  page:
    statCardBackground: linear-gradient(165deg, rgba(35,35,50,0.7) 0%, rgba(20,20,32,0.4) 60%, rgba(15,15,25,0.5) 100%)
colorOverrides:
  primary: '#6366f1'
  primaryForeground: '#FFFFFF'
  accent: '#8b5cf6'
  accentForeground: '#FFFFFF'
  ring: '#6366f1'
  border: '#24304A'
  input: '#0F1728'
  muted: '#1B2740'
  mutedForeground: '#8B95A8'
  card: '#11182A'
  popover: '#11182A'
  secondary: '#151D32'
  secondaryForeground: '#E6EAF2'
  success: '#22c55e'
  warning: '#f59e0b'
  destructive: '#EF4444'
  destructiveForeground: '#FFFFFF'
